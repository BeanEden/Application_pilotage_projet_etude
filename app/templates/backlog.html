{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <div>
        <h1>Backlog NovaRetail</h1>
        <p class="subtitle">Gestion interactive des tâches et des ressources du projet.</p>
    </div>
    <div style="display: flex; gap: 0.75rem; align-items: center;">
        <button class="btn btn-secondary" onclick="exportToPDF()"><i class="ph ph-file-pdf"></i> Exporter en PDF</button>
        <div style="background: var(--bg-card); padding: 3px; border-radius: 8px; border: 1px solid var(--border); display: flex; gap: 2px;">
            <select id="filter-task-type" class="form-control" style="border: none; background: transparent; height: 100%; font-size: 0.9rem;" onchange="renderBacklog()">
                <option value="all">Tous types</option>
                <option value="Tâche originelle">Originelle</option>
                <option value="Tâche additionnelle">Additionnelle</option>
                <option value="Évolution d'une tâche existante">Évolution</option>
            </select>
        </div>
        <div style="background: var(--bg-card); padding: 3px; border-radius: 8px; border: 1px solid var(--border); display: flex; gap: 2px;">
            <button class="btn-group" onclick="switchView('sprint', this)" id="btn-sprint" style="background: var(--accent); color: white;">Par Sprint</button>
            <button class="btn-group" onclick="switchView('bucket', this)" id="btn-bucket" style="background: transparent; color: var(--text-secondary);">Par Bucket</button>
        </div>
        <button class="btn btn-primary" onclick="openTaskModal()"><i class="ph ph-plus"></i> Nouvelle Tâche</button>
    </div>
</div>

<div id="backlog-container"></div>

<!-- Task Modal -->
<div id="taskModal" class="modal">
    <div class="modal-content">
        <h2 id="taskModalTitle">Modifier la tâche</h2>
        <input type="hidden" id="edit-task-old-id">
        <div class="grid-cols-2">
            <div class="form-group">
                <label>ID Tâche (Auto)</label>
                <input type="text" id="form-task-id" class="form-control" readonly style="background-color: var(--bg-body); cursor: not-allowed;">
            </div>
            <div class="form-group">
                <label>Sprint</label>
                <select id="form-task-sprint" class="form-control">
                    <option value="1">Sprint 1</option><option value="2">Sprint 2</option>
                    <option value="3">Sprint 3</option><option value="4">Sprint 4</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label>Nom de la tâche</label>
            <input type="text" id="form-task-name" class="form-control">
        </div>
        <div class="grid-cols-2">
            <div class="form-group">
                <label>Type de tâche</label>
                <select id="form-task-type" class="form-control">
                    <option value="Tâche originelle">Tâche originelle</option>
                    <option value="Tâche additionnelle">Tâche additionnelle</option>
                    <option value="Évolution d'une tâche existante">Évolution d'une tâche existante</option>
                </select>
            </div>
            <div class="form-group">
                <label>Bucket</label>
                <select id="form-task-bucket" class="form-control">
                    <option value="Cadrage">Cadrage</option><option value="Architecture">Architecture</option>
                    <option value="Modélisation">Modélisation</option><option value="Pipeline">Pipeline</option>
                    <option value="Stack Alternative">Stack Alternative</option><option value="Power BI">Power BI</option>
                    <option value="Rapport">Rapport</option><option value="Soutenance">Soutenance</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label>Assigné à</label>
            <div id="form-task-assignees-container" class="form-control" style="height: 120px; overflow-y: auto; display: flex; flex-direction: column; gap: 0.5rem; padding: 0.5rem; background: var(--bg-body);">
                {% for c in collaborators %}
                <label style="display: flex; align-items: center; gap: 0.5rem; margin: 0; cursor: pointer; font-weight: 500;">
                    <input type="checkbox" value="{{ c.name }}" class="assignee-checkbox"> {{ c.name }}
                </label>
                {% endfor %}
            </div>
        </div>
        <div class="form-group">
            <label>Dépendances</label>
            <div id="form-task-deps-container" class="form-control" style="height: 120px; overflow-y: auto; display: flex; flex-direction: column; gap: 0.5rem; padding: 0.5rem; background: var(--bg-body);">
                <!-- Rempli dynamiquement -->
            </div>
        </div>
        <div class="form-group">
            <label>Durée</label>
            <div style="display: flex; gap: 0.5rem;">
                <input type="number" step="0.5" id="form-task-duration-val" class="form-control" style="flex: 1;" placeholder="ex: 1">
                <select id="form-task-duration-unit" class="form-control" style="flex: 1;">
                    <option value="h">Heure(s)</option>
                    <option value="j">Jour(s)</option>
                    <option value="sem">Semaine(s)</option>
                    <option value="mois">Mois</option>
                </select>
            </div>
        </div>
        <div style="display: flex; justify-content: flex-end; gap: 0.75rem; margin-top: 1rem;">
            <button class="btn btn-secondary" onclick="closeTaskModal()">Annuler</button>
            <button class="btn btn-primary" onclick="saveTask()">Enregistrer</button>
        </div>
    </div>
</div>

<script>
let allTasks = {{ tasks|tojson|safe }};

let currentGrouping = 'sprint';

function renderBacklog() {
    const container = document.getElementById('backlog-container');
    container.innerHTML = '';
    const typeFilter = document.getElementById('filter-task-type') ? document.getElementById('filter-task-type').value : 'all';
    
    const groups = {};
    allTasks.forEach(task => { 
        const tType = task.type || "Tâche originelle";
        if (typeFilter !== 'all' && tType !== typeFilter) return;
        
        const k = task[currentGrouping] || "Non classé"; 
        if (!groups[k]) groups[k] = []; 
        groups[k].push(task); 
    });
    const keys = Object.keys(groups).sort((a, b) => currentGrouping === 'sprint' ? parseInt(a) - parseInt(b) : a.localeCompare(b));

    keys.forEach(key => {
        const title = currentGrouping === 'sprint' ? `Sprint ${key}` : key;
        const card = document.createElement('div');
        card.className = 'card';
        card.style.padding = '0';
        card.style.overflow = 'hidden';
        card.innerHTML = `
            <div style="padding: 1rem 1.5rem; background: var(--bg-body); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 0.75rem;">
                <i class="ph ph-${currentGrouping === 'sprint' ? 'rocket-launch' : 'package'}" style="color: var(--accent-vivid);"></i>
                <span style="font-weight: 700; font-size: 0.9rem;">${title}</span>
                <span class="badge" style="margin-left: auto;">${groups[key].length} tâches</span>
            </div>
            <table><thead><tr>
                <th style="width: 80px;">ID</th><th>Tâche</th><th>Assigné à</th><th>Durée</th><th>Dépend.</th><th style="width: 80px; text-align: center;">Actions</th>
            </tr></thead><tbody id="tbody-${key}"></tbody></table>
        `;
        container.appendChild(card);
        const tbody = document.getElementById(`tbody-${key}`);
        groups[key].forEach(task => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><span class="mono" style="color: var(--accent-vivid); font-weight: 700; font-size: 0.8rem;">${task.id}</span></td>
                <td style="font-weight: 500;">${task.task}<br><span style="font-size: 0.75rem; color: var(--text-secondary);">${task.type || "Tâche originelle"}</span></td>
                <td><div style="display: flex; gap: 4px; flex-wrap: wrap;">${task.assignees.map(p => `<span class="badge">${p.split(' ')[0]}</span>`).join('')}</div></td>
                <td style="color: var(--text-secondary); font-size: 0.85rem;"><i class="ph ph-clock"></i> ${task.duration}</td>
                <td>${task.deps !== '-' ? `<span class="badge" style="background: rgba(255,59,48,0.06); color: var(--danger);">${task.deps}</span>` : '<span style="color: var(--border);">—</span>'}</td>
                <td style="text-align: center;"><div style="display: flex; gap: 0.75rem; justify-content: center;"><i class="ph ph-pencil-simple edit-btn" onclick="editTask('${task.id}')"></i><i class="ph ph-trash remove-btn" onclick="removeTask('${task.id}')"></i></div></td>
            `;
            tbody.appendChild(row);
        });
    });
}

function switchView(view, btn) {
    currentGrouping = view;
    document.querySelectorAll('.btn-group').forEach(b => { b.style.background = 'transparent'; b.style.color = 'var(--text-secondary)'; });
    btn.style.background = 'var(--accent)'; btn.style.color = 'white';
    renderBacklog();
}

function openTaskModal(isEdit = false) {
    document.getElementById('taskModal').classList.add('active');
    
    // Remplir dynamiquement les dépendances
    const depsContainer = document.getElementById('form-task-deps-container');
    depsContainer.innerHTML = '';
    const currentId = document.getElementById('edit-task-old-id').value;
    allTasks.forEach(t => {
        if (!isEdit || t.id !== currentId) {
            const label = document.createElement('label');
            label.style.display = 'flex';
            label.style.alignItems = 'center';
            label.style.gap = '0.5rem';
            label.style.margin = '0';
            label.style.cursor = 'pointer';
            label.style.fontWeight = '500';
            
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.className = 'dep-checkbox';
            checkbox.value = t.id;
            
            label.appendChild(checkbox);
            label.appendChild(document.createTextNode(' ' + t.task));
            depsContainer.appendChild(label);
        }
    });

    if(!isEdit) { 
        document.getElementById('taskModalTitle').innerText = "Nouvelle Tâche"; 
        document.getElementById('edit-task-old-id').value = ""; 
        
        // Générer ID automatiquement (T- + nombre max + 1)
        const maxId = Math.max(0, ...allTasks.map(t => parseInt((t.id.match(/\d+/) || [0])[0])));
        document.getElementById('form-task-id').value = 'T-' + (maxId + 1);

        document.getElementById('form-task-name').value = "";
        document.getElementById('form-task-type').value = "Tâche originelle";
        document.getElementById('form-task-duration-val').value = "";
        document.getElementById('form-task-duration-unit').value = "sem";
        
        document.querySelectorAll('.assignee-checkbox').forEach(cb => cb.checked = false);
        document.querySelectorAll('.dep-checkbox').forEach(cb => cb.checked = false);
    }
}
function closeTaskModal() { document.getElementById('taskModal').classList.remove('active'); }

function editTask(taskId) {
    const task = allTasks.find(t => t.id === taskId); if (!task) return;
    document.getElementById('edit-task-old-id').value = task.id;
    openTaskModal(true);
    document.getElementById('taskModalTitle').innerText = "Modifier la tâche";
    document.getElementById('form-task-id').value = task.id;
    document.getElementById('form-task-name').value = task.task;
    document.getElementById('form-task-type').value = task.type || "Tâche originelle";
    
    const durMatch = task.duration ? task.duration.match(/^(\d+(?:\.\d+)?)\s*(.*)$/) : null;
    if (durMatch) {
        document.getElementById('form-task-duration-val').value = durMatch[1];
        document.getElementById('form-task-duration-unit').value = durMatch[2] || "sem";
    } else {
        document.getElementById('form-task-duration-val').value = "";
        document.getElementById('form-task-duration-unit').value = "sem";
    }

    document.getElementById('form-task-sprint').value = task.sprint;
    document.getElementById('form-task-bucket').value = task.bucket;

    document.querySelectorAll('.assignee-checkbox').forEach(cb => {
        cb.checked = task.assignees.includes(cb.value);
    });

    const depsArray = (task.deps && task.deps !== '-') ? task.deps.split(',').map(s => s.trim()) : [];
    document.querySelectorAll('.dep-checkbox').forEach(cb => {
        cb.checked = depsArray.includes(cb.value);
    });
}

function saveTask() {
    const oldId = document.getElementById('edit-task-old-id').value;
    const id = document.getElementById('form-task-id').value;
    const taskName = document.getElementById('form-task-name').value;
    
    const assignees = Array.from(document.querySelectorAll('.assignee-checkbox:checked')).map(cb => cb.value);
    
    const durationVal = document.getElementById('form-task-duration-val').value;
    const durationUnit = document.getElementById('form-task-duration-unit').value;
    const duration = durationVal ? `${durationVal} ${durationUnit}` : "";
    
    const selectedDeps = Array.from(document.querySelectorAll('.dep-checkbox:checked')).map(cb => cb.value);
    const deps = selectedDeps.length > 0 ? selectedDeps.join(', ') : '-';
    
    const sprint = parseInt(document.getElementById('form-task-sprint').value);
    const bucket = document.getElementById('form-task-bucket').value;
    const taskType = document.getElementById('form-task-type').value;
    const data = { id, task: taskName, assignees, duration, deps, sprint, bucket, type: taskType };
    
    // Calcul de la semaine de début en fonction des dépendances
    let computedStartWeek = (sprint - 1) * 2;
    if (deps && deps !== '-') {
        const depIds = deps.split(',').map(s => s.trim());
        let maxDepEnd = -1;
        depIds.forEach(depId => {
            const depTask = allTasks.find(t => t.id === depId);
            if (depTask) {
                const start = depTask.start_week || 0;
                let durWeeks = 1;
                if (depTask.duration) {
                    const match = depTask.duration.match(/^(\d+(?:\.\d+)?)\s*(.*)$/);
                    if (match) {
                        const val = parseFloat(match[1]);
                        const unit = match[2];
                        if (unit.startsWith('j')) durWeeks = val / 5;
                        else if (unit.startsWith('mois')) durWeeks = val * 4;
                        else if (unit.startsWith('h')) durWeeks = val / 35;
                        else durWeeks = val;
                    }
                }
                const end = start + durWeeks;
                if (end > maxDepEnd) maxDepEnd = end;
            }
        });
        if (maxDepEnd !== -1) {
            computedStartWeek = Math.ceil(maxDepEnd);
        }
    }
    
    data.start_week = computedStartWeek;

    if(oldId) { 
        const i = allTasks.findIndex(t => t.id === oldId); 
        if (i !== -1) {
            allTasks[i] = { ...allTasks[i], ...data }; 
        }
    } else { 
        allTasks.push(data); 
    }
    
    fetch('/api/save-tasks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(allTasks)
    }).then(() => {
        renderBacklog(); 
        closeTaskModal();
    });
}

function removeTask(taskId) { 
    if(confirm("Supprimer cette tâche ?")) { 
        allTasks = allTasks.filter(t => t.id !== taskId); 
        fetch('/api/save-tasks', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(allTasks)
        }).then(() => {
            renderBacklog(); 
        });
    } 
}

renderBacklog();
</script>
{% endblock %}
